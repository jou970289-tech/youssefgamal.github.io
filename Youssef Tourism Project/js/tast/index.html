<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز العمرة الاحترافي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>خدمات العمرة المتميزة</h1>
            <p>املأ البيانات أدناه لحجز رحلتك إلى بيت الله الحرام</p>
        </header>

        <form id="umrahForm">
            
            <!-- قسم البيانات الشخصية -->
            <div class="form-group">
                <label for="fullName">الاسم الكامل:</label>
                <input type="text" id="fullName" name="fullName" placeholder="أدخل اسمك كاملاً" required>
            </div>

            <div class="form-group">
                <label for="phone">رقم الهاتف:</label>
                <input type="tel" id="phone" name="phone" placeholder="مثال: 05xxxxxxxx" required>
            </div>

            <div class="form-group">
                <label for="age">العمر:</label>
                <input type="number" id="age" name="age" placeholder="أدخل عمرك" required min="18">
            </div>

            <div class="form-group">
                <label for="days">عدد أيام الحجز:</label>
                <input type="number" id="days" name="days" placeholder="عدد الأيام" required min="1">
            </div>

            <!-- قسم تحميل الصور -->
            <div class="form-group image-upload">
                <label for="passport">صورة الجواز (Passport):</label>
                <input type="file" id="passport" name="passport" accept="image/*" required>
            </div>

            <div class="form-group image-upload">
                <label for="photo">صورة شخصية (خلفية بيضاء):</label>
                <input type="file" id="photo" name="photo" accept="image/*" required>
            </div>

            <!-- زر الإرسال -->
            <button type="submit" class="submit-btn">إرسال طلب الحجز</button>
        </form>

        <div id="successMessage" class="success-message" style="display: none;">
            <h2>✅ تم استلام طلبك بنجاح!</h2>
            <p>سيقوم فريقنا بالتواصل معك قريباً لتأكيد الحجز.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
